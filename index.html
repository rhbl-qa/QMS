<!DOCTYPE html>
<html>
<head>
    <title>RHBL QMS</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <iframe
        src="https://script.google.com/macros/s/AKfycbwVCwp658VY9tVc3xoH4KZUpzcnsZ9He_is5qxGWX4o_wKhDLYj2ZHub5bShCkI2-SOAA/exec"
        allowfullscreen
        style="position:fixed; top:0; left:0; width:100%; height:100%; border:none;">
    </iframe>

    <script>
        window.onload = function () {
            document.querySelector('iframe')
                .requestFullscreen()
                .catch((err) => {
                    console.error(`Error attempting to enable full-screen mode: ${err.message}`);
                });
        };
    </script>

</body>
</html>
